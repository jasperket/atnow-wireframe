<master-entry-layout
  [isMobile]="isMobile"
  [showNew]="true"
  (new)="onNew()"
  [showEdit]="true"
  [disableEdit]="!selectedItem || !isReadOnly"
  (edit)="onEdit()"
  [showSave]="true"
  [disableSave]="isReadOnly"
  (save)="onSave()"
  [showDelete]="true"
  [disableDelete]="!selectedItem"
  (delete)="onDelete()"
  [showExport]="true"
  [showRefresh]="true"
  [showSearch]="true"
  [showFilter]="true">

  <toolbar-right>
    <dx-button icon="more" stylingMode="text"></dx-button>
  </toolbar-right>

  <master-pane>
    <dx-data-grid
      [dataSource]="items"
      [showBorders]="true"
      [columnAutoWidth]="true"
      [rowAlternationEnabled]="true"
      [columnHidingEnabled]="true"
      height="100%"
      (onSelectionChanged)="onSelectionChanged($event)">
      <dxo-selection mode="single"></dxo-selection>
      <dxo-paging [pageSize]="20"></dxo-paging>
      <dxi-column dataField="itemCode" caption="Item Code"></dxi-column>
      <dxi-column dataField="itemName" caption="Item Name"></dxi-column>
      <dxi-column dataField="specs" caption="Specs"></dxi-column>
    </dx-data-grid>
  </master-pane>

  <detail-pane>
    <dx-form
      [formData]="selectedItem"
      [colCountByScreen]="{ lg: 2, md: 2, sm: 1, xs: 1 }"
      labelLocation="top"
      [showColonAfterLabel]="false"
      [readOnly]="isReadOnly">
      <dxi-item dataField="itemCode" caption="Item Code">
        <dxi-validation-rule type="required" message="Item Code is required"></dxi-validation-rule>
      </dxi-item>
      <dxi-item dataField="itemName" caption="Item Name">
        <dxi-validation-rule type="required" message="Item Name is required"></dxi-validation-rule>
      </dxi-item>
      <dxi-item dataField="specs" caption="Specification" [colSpan]="2"></dxi-item>
      <dxi-item dataField="unit" caption="Unit" editorType="dxSelectBox" [editorOptions]="{ items: ['PCS', 'BOX', 'KG', 'LBS'], searchEnabled: true, readOnly: isReadOnly }"></dxi-item>
      <dxi-item dataField="label1" caption="Label"></dxi-item>
      <dxi-item dataField="forTrading" caption="For Trading" editorType="dxCheckBox" [colSpan]="1"></dxi-item>
      <dxi-item dataField="label2" caption="Label"></dxi-item>
    </dx-form>
  </detail-pane>
</master-entry-layout>
