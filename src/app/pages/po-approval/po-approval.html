<app-header [showBackButton]="true"></app-header>
<div class="d-flex flex-column bg-light w-100" style="height: calc(100vh - 50px);">
  <div class="px-4 py-2 bg-white border-bottom">
    <dx-toolbar>
      <dxi-item location="before" locateInMenu="auto">
        <dx-button icon="check" text="APPROVE" type="default" stylingMode="outlined" (onClick)="onApprove()"></dx-button>
      </dxi-item>
       <dxi-item location="before" locateInMenu="auto">
        <dx-button icon="edit" text="EDIT" stylingMode="outlined" [disabled]="!isReadOnly" (onClick)="onEdit()"></dx-button>
      </dxi-item>
      <dxi-item location="before" locateInMenu="auto">
        <dx-button icon="add" text="NEW" stylingMode="outlined" (onClick)="onNew()"></dx-button>
      </dxi-item>
      <dxi-item location="before" locateInMenu="auto">
        <dx-button icon="trash" text="DELETE" stylingMode="outlined" (onClick)="onDelete()"></dx-button>
      </dxi-item>
      <dxi-item location="before" locateInMenu="auto">
        <dx-button icon="export" text="EXPORT" stylingMode="outlined"></dx-button>
      </dxi-item>
      <dxi-item location="before" locateInMenu="auto">
        <dx-button icon="refresh" stylingMode="text"></dx-button>
      </dxi-item>
      <dxi-item location="after">
        <dx-text-box mode="search" placeholder="" width="250"></dx-text-box>
      </dxi-item>
      <dxi-item location="after" locateInMenu="auto">
        <dx-button icon="filter" text="STATUS" stylingMode="outlined"></dx-button>
      </dxi-item>
    </dx-toolbar>
  </div>
  <div class="flex-grow-1 p-0 bg-white overflow-hidden">
    <dx-data-grid
      [dataSource]="purchaseOrders"
      [showBorders]="true"
      [columnAutoWidth]="true"
      [columnHidingEnabled]="true"
      [rowAlternationEnabled]="true"
      [(selectedRowKeys)]="selectedRowKeys"
      keyExpr="id"
      height="100%">
      
      <dxo-selection mode="multiple" showCheckBoxesMode="always"></dxo-selection>
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[10, 20, 50]" [showInfo]="false"></dxo-pager>
      <dxo-editing [allowUpdating]="!isReadOnly" mode="cell"></dxo-editing>

      <dxi-column dataField="orderNo" caption="Order No"></dxi-column>
      <dxi-column dataField="supplier" caption="Supplier"></dxi-column>
      <dxi-column dataField="orderDate" caption="Order Date"></dxi-column>
      <dxi-column dataField="orderAmount" caption="Order Amount" format="currency"></dxi-column>
      <dxi-column dataField="preparedBy" caption="Prepared By"></dxi-column>
    </dx-data-grid>
  </div>
</div>
