<list-entry-layout
  [showApprove]="true"
  (approve)="onApprove()"
  [showEdit]="true"
  [disableEdit]="!isReadOnly"
  (edit)="onEdit()"
  [showNew]="true"
  (new)="onNew()"
  [showDelete]="true"
  (delete)="onDelete()"
  [showExport]="true"
  [showRefresh]="true"
  [showSearch]="true"
  [showFilter]="true">

  <list-content class="w-100">
    <dx-data-grid
      [dataSource]="purchaseOrders"
      [showBorders]="true"
      [columnAutoWidth]="true"
      [columnHidingEnabled]="true"
      [rowAlternationEnabled]="true"
      [(selectedRowKeys)]="selectedRowKeys"
      keyExpr="id"
      height="100%">
      
      <dxo-selection mode="multiple" showCheckBoxesMode="always"></dxo-selection>
      <dxo-paging [pageSize]="10"></dxo-paging>
      <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[10, 20, 50]" [showInfo]="false"></dxo-pager>
      <dxo-editing [allowUpdating]="!isReadOnly" mode="cell"></dxo-editing>

      <dxi-column dataField="orderNo" caption="Order No"></dxi-column>
      <dxi-column dataField="supplier" caption="Supplier"></dxi-column>
      <dxi-column dataField="orderDate" caption="Order Date"></dxi-column>
      <dxi-column dataField="orderAmount" caption="Order Amount" format="currency"></dxi-column>
      <dxi-column dataField="preparedBy" caption="Prepared By"></dxi-column>
    </dx-data-grid>
  </list-content>
</list-entry-layout>
